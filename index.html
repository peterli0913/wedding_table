<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>李涛 ❤️ 李懋 · 婚礼座位图</title>
<style>
  :root{
    --bg1:#fff7f3; --bg2:#fdeef0; --ink:#5b3b46; --muted:#a98a92;
    --gold:#c79a4b; --gold-soft:#e7cf9a; --rose:#e98aa0; --rose-soft:#fbdde4;
    --card:#ffffff; --line:#f0d9de; --stage:#d9b3bf; --seat:#fbeef1;
    --empty:#fbf6f7; --occ:#fde4ea; --shadow:0 8px 24px rgba(150,80,100,.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 500px at 50% -10%, #ffffff 0%, var(--bg2) 55%, var(--bg1) 100%);
    min-height:100vh;
  }
  header.top{
    text-align:center; padding:26px 16px 8px;
  }
  header.top .names{
    font-family:"STKaiti","KaiTi","Songti SC",serif;
    font-size:34px; font-weight:700; letter-spacing:2px;
    color:var(--ink);
  }
  header.top .names .heart{color:var(--rose);}
  header.top .sub{ color:var(--muted); margin-top:6px; font-size:14px; letter-spacing:3px;}
  .toolbar{
    display:flex; justify-content:center; align-items:center; gap:12px;
    flex-wrap:wrap; margin:14px 0 6px;
  }
  .stat{
    background:#fff; border:1px solid var(--line); border-radius:999px;
    padding:7px 16px; font-size:13px; color:var(--ink); box-shadow:var(--shadow);
  }
  .stat b{color:var(--rose); font-size:15px;}
  .stat.status{display:inline-flex; align-items:center; gap:7px;}
  .stat.status .dot{width:9px; height:9px; border-radius:50%; background:#c8b0b6; flex:none;}
  .stat.status.ok .dot{background:#4caf72; box-shadow:0 0 0 3px rgba(76,175,114,.18);}
  .stat.status.connecting .dot{background:#e0a94b; animation:blink 1s infinite;}
  .stat.status.local .dot{background:#b9a0c8;}
  .stat.status.err .dot{background:#e06363;}
  @keyframes blink{50%{opacity:.3;}}
  .btn{
    border:none; cursor:pointer; border-radius:999px; padding:8px 16px;
    font-size:13px; font-weight:600; transition:.15s; box-shadow:var(--shadow);
  }
  .btn.ghost{background:#fff;color:var(--muted);border:1px solid var(--line);}
  .btn.ghost:hover{color:var(--rose);border-color:var(--rose-soft);}
  .hint{ text-align:center; color:var(--muted); font-size:12px; margin:2px 0 10px;}

  .hall{
    display:grid;
    grid-template-columns:1fr 150px 1fr;
    gap:18px; max-width:1180px; margin:8px auto 60px; padding:0 18px;
    align-items:start;
  }
  .col{display:flex; flex-direction:column; gap:22px;}

  /* ===== T 型舞台 ===== */
  .stage{
    position:sticky; top:14px;
    display:flex; flex-direction:column; align-items:center;
    align-self:stretch;
  }
  .stage-front{
    color:var(--muted); font-size:12px; letter-spacing:4px; margin-bottom:6px;
  }
  .stage-top{
    width:100%; height:74px; border-radius:16px;
    background:linear-gradient(135deg,#f4c9d4,#d9b3bf);
    box-shadow:var(--shadow);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:700; letter-spacing:2px; font-size:15px;
    text-shadow:0 1px 2px rgba(120,60,80,.35);
  }
  .stage-stem{
    width:62px; flex:1 1 auto; min-height:340px;
    margin-top:0;
    background:linear-gradient(180deg,#d9b3bf,#eccdd6);
    border-radius:0 0 14px 14px;
    box-shadow:var(--shadow);
    display:flex; align-items:flex-start; justify-content:center;
    padding-top:14px;
    color:#fff; font-size:20px; writing-mode:vertical-rl; letter-spacing:6px;
    text-shadow:0 1px 2px rgba(120,60,80,.35);
  }

  /* ===== 桌卡片 ===== */
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:20px;
    box-shadow:var(--shadow); padding:14px 14px 16px; position:relative;
  }
  .card-head{display:flex; align-items:center; gap:8px; margin-bottom:2px;}
  .badge{
    background:linear-gradient(135deg,var(--gold),var(--gold-soft));
    color:#fff; font-weight:700; font-size:12px; border-radius:8px;
    padding:3px 8px; flex:none; box-shadow:0 2px 6px rgba(180,140,60,.3);
  }
  .host{font-weight:700; font-size:16px;}
  .count{
    margin-left:auto; font-size:12px; color:var(--muted);
    background:var(--bg1); border-radius:999px; padding:3px 10px; white-space:nowrap;
  }
  .count.over b{color:var(--rose);}
  .note{font-size:11px; color:var(--muted); margin:2px 0 0;}

  .table-area{
    position:relative; width:264px; height:264px; margin:8px auto 4px;
  }
  .table-center{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:96px; height:96px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff, var(--rose-soft));
    border:2px solid var(--gold-soft);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--ink); box-shadow:inset 0 2px 8px rgba(200,120,140,.25);
  }
  .table-center .tc-host{font-weight:700; font-size:15px;}
  .table-center .tc-label{font-size:10px; color:var(--muted); margin-top:2px;}

  .seat{
    position:absolute; width:60px; height:46px; border-radius:12px;
    border:1.5px solid var(--line); background:var(--seat);
    font-size:10px; line-height:1.15; color:var(--ink);
    display:flex; align-items:center; justify-content:center; text-align:center;
    cursor:pointer; padding:2px 3px; overflow:hidden; transition:.12s;
  }
  .seat:hover{transform:translateY(-2px); box-shadow:0 6px 14px rgba(200,120,140,.28); border-color:var(--rose);}
  .seat.occ{background:var(--occ); border-color:var(--rose-soft); font-weight:600;}
  .seat.empty{background:var(--empty); border-style:dashed; color:#cdb3ba;}
  .seat.empty::before{content:"＋ 空位"; font-size:11px;}
  .seat.host{border:2px solid var(--gold); background:#fff6e3;}
  .seat .txt{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

  .added-wrap{margin-top:4px;}
  .added-title{font-size:11px; color:var(--gold); font-weight:700; margin:4px 0 6px; display:flex; align-items:center; gap:6px;}
  .added-title::before{content:""; width:14px; height:2px; background:var(--gold-soft); border-radius:2px;}
  .added-list{display:flex; flex-wrap:wrap; gap:8px;}
  .added-seat{
    border:1.5px dashed var(--gold-soft); background:#fffaf0; border-radius:12px;
    min-width:64px; min-height:40px; padding:4px 8px; font-size:11px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; text-align:center; color:var(--ink);
    transition:.12s;
  }
  .added-seat:hover{transform:translateY(-2px); box-shadow:0 6px 14px rgba(200,160,80,.3);}
  .added-seat.occ{background:#fff1cf; font-weight:600;}
  .added-seat.empty{color:#cbb98e;}

  .actions{display:flex; gap:8px; margin-top:12px;}
  .actions .btn{flex:1; box-shadow:none;}
  .btn.add{background:linear-gradient(135deg,var(--rose),#f4a7b9); color:#fff;}
  .btn.add:hover{filter:brightness(1.05);}
  .btn.del{background:#fff; color:var(--muted); border:1px solid var(--line);}
  .btn.del:hover{color:var(--rose); border-color:var(--rose-soft);}

  /* ===== 弹窗 ===== */
  .overlay{
    position:fixed; inset:0; background:rgba(90,50,60,.35);
    display:none; align-items:center; justify-content:center; z-index:50; padding:16px;
    backdrop-filter:blur(2px);
  }
  .overlay.show{display:flex;}
  .modal{
    background:#fff; border-radius:20px; width:340px; max-width:100%;
    padding:22px; box-shadow:0 20px 50px rgba(120,60,80,.3); animation:pop .15s ease;
  }
  @keyframes pop{from{transform:scale(.94);opacity:0;}to{transform:scale(1);opacity:1;}}
  .modal h3{margin:0 0 4px; font-size:18px;}
  .modal .msub{color:var(--muted); font-size:12px; margin-bottom:14px;}
  .modal input{
    width:100%; padding:11px 12px; border:1.5px solid var(--line); border-radius:12px;
    font-size:15px; color:var(--ink); outline:none;
  }
  .modal input:focus{border-color:var(--rose);}
  .modal-btns{display:flex; gap:8px; margin-top:16px;}
  .modal-btns .btn{flex:1; box-shadow:none;}
  .btn.primary{background:linear-gradient(135deg,var(--rose),#f4a7b9); color:#fff;}
  .btn.warn{background:#fff; color:var(--muted); border:1px solid var(--line);}

  footer{text-align:center; color:var(--muted); font-size:12px; padding:0 16px 30px;}

  @media (max-width:820px){
    .hall{grid-template-columns:1fr; }
    .stage{order:-1; position:relative; top:0;}
    .stage-stem{display:none;}
    .stage-top{height:60px;}
    .table-area{width:264px;}
  }
</style>
</head>
<body>
  <header class="top">
    <div class="names">李涛 <span class="heart">❤</span> 李懋</div>
    <div class="sub">婚 礼 宴 席 · 座 位 示 意 图</div>
  </header>

  <div class="toolbar">
    <div class="stat">宾客 <b id="statGuests">0</b> 位</div>
    <div class="stat">餐桌 <b id="statTables">0</b> 桌</div>
    <div class="stat">座位 <b id="statSeats">0</b> 个</div>
    <div class="stat status" id="statusPill"><span class="dot"></span><span id="statusText">连接中…</span></div>
    <button class="btn ghost" id="resetBtn">↺ 恢复默认</button>
  </div>
  <div class="hint" id="hint">点击任意「座位 / 空位」即可添加、修改或清空宾客 · 改动会实时同步给所有人</div>

  <div class="hall">
    <div class="col" id="colLeft"></div>
    <div class="stage">
      <div class="stage-front">前 方</div>
      <div class="stage-top">T 型 舞 台</div>
      <div class="stage-stem">新 人 入 场</div>
    </div>
    <div class="col" id="colRight"></div>
  </div>

  <footer>左右两侧各 4 桌 · 标准每桌 10 座 · 超出人数以「加座」显示在桌旁</footer>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h3>编辑座位</h3>
      <div class="msub" id="modalSub"></div>
      <input id="seatInput" placeholder="请输入宾客姓名（留空表示空位）" />
      <div class="modal-btns">
        <button class="btn warn" id="mClear">清空座位</button>
        <button class="btn warn" id="mCancel">取消</button>
        <button class="btn primary" id="mSave">保存</button>
      </div>
    </div>
  </div>

<script type="module">
// Firebase SDK 仅在「已配置云端」时按需动态加载（CDN），
// 未配置 / 离线时仍可正常使用本机模式，不依赖网络。
const FB_VER = "11.6.1";

/* ============================================================
   ① 在下面填入你的 Firebase 网页配置（Firebase 控制台 → 项目设置
      → 你的应用 → SDK 配置里复制 firebaseConfig 的各字段）。
      填好后即变为「多人实时共享」模式；不填则保持「本机模式」。
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyBbLgKxpxowVQpq6bbnMw4YWAGxO6Kcdpw",
  authDomain: "wedding-table-67606.firebaseapp.com",
  projectId: "wedding-table-67606",
  storageBucket: "wedding-table-67606.firebasestorage.app",
  messagingSenderId: "798326396372",
  appId: "1:798326396372:web:3c0e0392198408d684f241"
};
// 共享数据存放位置（集合名 / 文档名，可不改）
const COLLECTION = "weddingSeating";
const DOC_ID = "main";
/* ============================================================ */

const DEFAULT_TABLES = [
  {"host":"高振福","side":"left","order":1,"note":"","seats":["高振福","崔立","高振福 家属","邓冰","邓冰 家属①","邓冰 家属②","杜海群","杜海群 家属","",""]},
  {"host":"蔡联","side":"left","order":2,"note":"出席人数 2或4 / 8或10人","seats":["蔡联","蔡联 家属","刘书原","刘书原 家属①","刘书原 家属②","章斐","章斐 家属①","章斐 家属②","",""]},
  {"host":"范琼","side":"left","order":3,"note":"部分 2或3 / 9或11人","seats":["范琼","范琼 家属","赵秀亭","赵秀亭 家属","廖铮华","廖铮华 家属①","廖铮华 家属②","雪晴","雪晴 家属",""]},
  {"host":"徐昊程","side":"left","order":4,"note":"含幼儿 1 位","seats":["徐昊程","徐昊程 家属","徐昊程 宝宝","满家辉","满家辉 家属","彭迪","彭迪 家属","","",""]},
  {"host":"李海滨","side":"right","order":1,"note":"","seats":["李海滨","李海滨 家属①","李海滨 家属②","李海滨 家属③","李海滨 家属④","李海滨 家属⑤","李海滨 家属⑥","李海滨 家属⑦","",""]},
  {"host":"姜琦","side":"right","order":2,"note":"","seats":["姜琦","姜琦 家属","刘浩宇","刘浩宇 家属","张婧","陈瑾","陈瑾 家属","李轶轩","李轶轩 家属","戴卓然"]},
  {"host":"韩慧中","side":"right","order":3,"note":"李海冉 2或3 / 共11人","seats":["韩慧中","韩慧中 家属","张逸洲","张逸洲 家属","李海冉","李海冉 家属","王乔因","王乔因 家属","薛广良","薛广良 家属","余辰宇"]},
  {"host":"待定","side":"right","order":4,"note":"暂未安排","seats":["","","","","","","","","",""]}
];

const STORE_KEY = "wedding_seating_litao_limao_v1";
const CIRC = "①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮";
const BASE = 10;            // 标准座位数
const SIZE = 264, R = 104, SW = 60, SH = 46;

let tables = [];
let editing = null;         // {t, s}

// ===== 数据层：云端实时同步 + 本机回退 =====
let docRef = null;          // Firestore 文档引用
let cloudReady = false;     // 是否处于云端实时模式
let fbApi = null;           // 动态加载的 Firestore 写入方法

const cloudEnabled =
  firebaseConfig.apiKey && !firebaseConfig.apiKey.includes("在此粘贴");

function setStatus(text, cls){
  const pill = document.getElementById("statusPill");
  pill.className = "stat status " + (cls || "");
  document.getElementById("statusText").textContent = text;
}

function localLoad(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){ const d = JSON.parse(raw); if(Array.isArray(d) && d.length) return d; }
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_TABLES));
}

// 持久化当前 tables：云端模式写 Firestore，否则写本机
function persist(){
  if(cloudReady && docRef && fbApi){
    fbApi.setDoc(docRef, { tables, updatedAt: fbApi.serverTimestamp() })
      .catch(err=>{ console.error(err); setStatus("保存失败，请检查网络/规则", "err"); });
  } else {
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(tables)); }catch(e){}
  }
}

function startLocalMode(reason){
  cloudReady = false;
  tables = localLoad();
  render();
  setStatus(reason || "本机模式（仅存本机）", "local");
  document.getElementById("hint").textContent =
    "未配置云端 / 暂用本机模式 · 改动只保存在本机，不会共享给他人";
}

async function startCloudMode(){
  setStatus("连接中…", "connecting");
  try{
    const { initializeApp } =
      await import(`https://www.gstatic.com/firebasejs/${FB_VER}/firebase-app.js`);
    const { getFirestore, doc, onSnapshot, setDoc, serverTimestamp } =
      await import(`https://www.gstatic.com/firebasejs/${FB_VER}/firebase-firestore.js`);
    fbApi = { setDoc, serverTimestamp };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    docRef = doc(db, COLLECTION, DOC_ID);
    onSnapshot(docRef, snap=>{
      if(!snap.exists()){
        // 首次使用：用默认数据初始化共享文档
        setDoc(docRef, { tables: DEFAULT_TABLES, updatedAt: serverTimestamp() })
          .catch(err=>{ console.error(err); setStatus("初始化失败，请检查规则", "err"); });
        return;
      }
      const data = snap.data();
      if(Array.isArray(data.tables)){
        tables = data.tables;
        cloudReady = true;
        render();
        const offline = snap.metadata.fromCache;
        setStatus(offline ? "☁ 离线缓存中…" : "☁ 已连接 · 实时同步", offline ? "connecting" : "ok");
        document.getElementById("hint").textContent =
          "点击任意「座位 / 空位」即可编辑 · 改动会实时同步给所有打开此页的人";
      }
    }, err=>{
      console.error(err);
      startLocalMode("云端连接失败，已转本机模式");
    });
  }catch(err){
    console.error(err);
    startLocalMode("云端初始化失败，已转本机模式");
  }
}

function tableLabel(t){
  const sideTxt = t.side === "left" ? "左" : "右";
  return sideTxt + CIRC[t.order-1];
}

function render(){
  const left = document.getElementById("colLeft");
  const right = document.getElementById("colRight");
  left.innerHTML = ""; right.innerHTML = "";

  // 按 order 排序后渲染
  const sorted = [...tables].sort((a,b)=>a.order-b.order);
  sorted.forEach(t=>{
    const idx = tables.indexOf(t);
    const card = buildCard(t, idx);
    (t.side === "left" ? left : right).appendChild(card);
  });

  // 统计
  let guests = 0, seats = 0;
  tables.forEach(t=>{ seats += t.seats.length; guests += t.seats.filter(s=>s.trim()).length; });
  document.getElementById("statGuests").textContent = guests;
  document.getElementById("statTables").textContent = tables.length;
  document.getElementById("statSeats").textContent = seats;
}

function buildCard(t, idx){
  const occ = t.seats.filter(s=>s.trim()).length;
  const total = t.seats.length;
  const over = total > BASE;

  const card = document.createElement("div");
  card.className = "card";

  const head = document.createElement("div");
  head.className = "card-head";
  head.innerHTML =
    `<span class="badge">${tableLabel(t)}</span>` +
    `<span class="host">${escapeHtml(t.host)} 桌</span>` +
    `<span class="count ${over?'over':''}">已坐 <b>${occ}</b> / ${total}${over?` <b>(加${total-BASE})</b>`:''}</span>`;
  card.appendChild(head);

  if(t.note){
    const note = document.createElement("div");
    note.className = "note";
    note.textContent = "备注：" + t.note;
    card.appendChild(note);
  }

  // 圆桌 + 10 个基础座位
  const area = document.createElement("div");
  area.className = "table-area";
  area.style.width = SIZE+"px"; area.style.height = SIZE+"px";

  const center = document.createElement("div");
  center.className = "table-center";
  center.innerHTML = `<div class="tc-host">${escapeHtml(t.host)}</div><div class="tc-label">${tableLabel(t)} 桌</div>`;
  area.appendChild(center);

  for(let i=0;i<BASE;i++){
    const ang = (-90 + i*(360/BASE)) * Math.PI/180;
    const cx = SIZE/2, cy = SIZE/2;
    const x = cx + R*Math.cos(ang) - SW/2;
    const y = cy + R*Math.sin(ang) - SH/2;
    const seat = makeSeat(t, idx, i);
    seat.style.left = x+"px"; seat.style.top = y+"px";
    area.appendChild(seat);
  }
  card.appendChild(area);

  // 加座区域
  if(total > BASE){
    const wrap = document.createElement("div");
    wrap.className = "added-wrap";
    const title = document.createElement("div");
    title.className = "added-title";
    title.textContent = `加座 ${total-BASE} 个`;
    wrap.appendChild(title);
    const list = document.createElement("div");
    list.className = "added-list";
    for(let i=BASE;i<total;i++){
      list.appendChild(makeAddedSeat(t, idx, i));
    }
    wrap.appendChild(list);
    card.appendChild(wrap);
  }

  // 操作按钮
  const actions = document.createElement("div");
  actions.className = "actions";
  const addBtn = document.createElement("button");
  addBtn.className = "btn add";
  addBtn.textContent = "＋ 加座位";
  addBtn.onclick = ()=>{ t.seats.push(""); persist(); render(); };
  const delBtn = document.createElement("button");
  delBtn.className = "btn del";
  delBtn.textContent = "－ 删除加座";
  delBtn.onclick = ()=>removeAddedSeat(idx);
  actions.appendChild(addBtn);
  actions.appendChild(delBtn);
  card.appendChild(actions);

  return card;
}

function makeSeat(t, idx, i){
  const name = t.seats[i] || "";
  const seat = document.createElement("div");
  const isHost = name && name === t.host;
  seat.className = "seat " + (name ? "occ" : "empty") + (isHost ? " host" : "");
  if(name){ seat.innerHTML = `<span class="txt">${escapeHtml(name)}</span>`; seat.title = name; }
  seat.onclick = ()=>openEditor(idx, i);
  return seat;
}

function makeAddedSeat(t, idx, i){
  const name = t.seats[i] || "";
  const el = document.createElement("div");
  el.className = "added-seat " + (name ? "occ" : "empty");
  el.innerHTML = name ? `<span class="txt">${escapeHtml(name)}</span>` : "＋ 空加座";
  if(name) el.title = name;
  el.onclick = ()=>openEditor(idx, i);
  return el;
}

function removeAddedSeat(idx){
  const t = tables[idx];
  if(t.seats.length <= BASE){
    alert("标准 10 座不能删除，只能删除多出的「加座」。");
    return;
  }
  const last = t.seats[t.seats.length-1];
  if(last && last.trim()){
    if(!confirm(`最后一个加座有宾客「${last}」，确定删除吗？`)) return;
  }
  t.seats.pop();
  persist(); render();
}

// ===== 弹窗编辑 =====
const overlay = document.getElementById("overlay");
const seatInput = document.getElementById("seatInput");
const modalSub = document.getElementById("modalSub");

function openEditor(t, s){
  editing = {t, s};
  const tbl = tables[t];
  const isAdded = s >= BASE;
  const seatNo = isAdded ? `加座 ${s-BASE+1}` : `座位 ${s+1}`;
  modalSub.textContent = `${tableLabel(tbl)} · ${tbl.host} 桌 · ${seatNo}`;
  seatInput.value = tbl.seats[s] || "";
  overlay.classList.add("show");
  setTimeout(()=>{ seatInput.focus(); seatInput.select(); }, 30);
}
function closeEditor(){ overlay.classList.remove("show"); editing = null; }
function saveEditor(){
  if(!editing) return;
  tables[editing.t].seats[editing.s] = seatInput.value.trim();
  persist(); render(); closeEditor();
}
document.getElementById("mSave").onclick = saveEditor;
document.getElementById("mCancel").onclick = closeEditor;
document.getElementById("mClear").onclick = ()=>{ seatInput.value=""; saveEditor(); };
seatInput.addEventListener("keydown", e=>{ if(e.key==="Enter") saveEditor(); if(e.key==="Escape") closeEditor(); });
overlay.addEventListener("click", e=>{ if(e.target===overlay) closeEditor(); });

document.getElementById("resetBtn").onclick = ()=>{
  if(confirm("确定恢复到 Excel 原始座位安排吗？当前所有修改将丢失。")){
    tables = JSON.parse(JSON.stringify(DEFAULT_TABLES));
    persist(); render();
  }
};

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

// ===== 启动 =====
if(cloudEnabled){
  startCloudMode();
} else {
  startLocalMode();
}
</script>
